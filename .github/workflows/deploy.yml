name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        shell: bash
        run: |
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || (echo "Missing secret: SUPABASE_ACCESS_TOKEN" && exit 1)
          [ -n "$SUPABASE_PROJECT_REF" ] || (echo "Missing secret: SUPABASE_PROJECT_REF" && exit 1)
          [ -n "$SUPABASE_DB_PASSWORD" ] || (echo "Missing secret: SUPABASE_DB_PASSWORD" && exit 1)

      - name: Log Supabase CLI version
        run: npx supabase@latest --version

      - name: Configure cloud verify target
        shell: bash
        run: |
          rm -f .env.local

          CLOUD_URL="https://${SUPABASE_PROJECT_REF}.supabase.co"
          API_KEYS_JSON="$(npx supabase@latest projects api-keys --project-ref "$SUPABASE_PROJECT_REF" --output json)"
          PUBLISHABLE_KEY="$(
            printf '%s' "$API_KEYS_JSON" | node -e '
              const fs = require("node:fs");
              const raw = fs.readFileSync(0, "utf8");
              const data = JSON.parse(raw);
              const list = Array.isArray(data) ? data : (Array.isArray(data.keys) ? data.keys : []);
              const match = list.find((item) => /anon|publishable/i.test(String(item?.name ?? item?.type ?? "")));
              const fallback = list[0];
              const selected = match ?? fallback ?? {};
              const key = selected.api_key ?? selected.key ?? selected.value ?? "";
              if (!key) process.exit(1);
              process.stdout.write(String(key));
            '
          )"

          {
            echo "EXPO_PUBLIC_SUPABASE_TARGET=cloud"
            echo "EXPO_PUBLIC_SUPABASE_CLOUD_URL=$CLOUD_URL"
            echo "EXPO_PUBLIC_SUPABASE_CLOUD_PUBLISHABLE_KEY=$PUBLISHABLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Verify local flow
        run: npm run verify:local-flow

      - name: Verify local audio flow
        run: npm run verify:local-audio-flow

      - name: Verify local reflection flow
        run: npm run verify:local-reflection-flow

      - name: Verify local output quality
        run: npm run verify:local-output-quality

      - name: Link Supabase project
        run: npx supabase@latest link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        run: npx supabase@latest db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Log functions to deploy
        shell: bash
        run: |
          echo "Functions from repo:"
          find supabase/functions -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort

      - name: Deploy edge functions
        run: npx supabase@latest functions deploy --project-ref "$SUPABASE_PROJECT_REF" --use-api
