name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        shell: bash
        run: |
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || (echo "Missing secret: SUPABASE_ACCESS_TOKEN" && exit 1)
          [ -n "$SUPABASE_PROJECT_REF" ] || (echo "Missing secret: SUPABASE_PROJECT_REF" && exit 1)

      - name: Log Supabase CLI version
        run: npx supabase@latest --version

      - name: Log functions to deploy
        shell: bash
        run: |
          echo "Functions from repo:"
          find supabase/functions -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort

      - name: Deploy private edge functions
        run: |
          npx supabase@latest functions deploy process-entry --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          npx supabase@latest functions deploy generate-reflection --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          npx supabase@latest functions deploy regenerate-day-journal --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          npx supabase@latest functions deploy import-chatgpt-markdown --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          npx supabase@latest functions deploy renormalize-entry --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
