<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#002204",
                        "background": "#faf9f6",
                        "surface-container-highest": "#e3e2df",
                        "on-primary-fixed-variant": "#574400",
                        "outline": "#807660",
                        "secondary-fixed-dim": "#a7c8ff",
                        "on-primary-fixed": "#241a00",
                        "on-primary-container": "#5e4a00",
                        "on-surface-variant": "#4e4633",
                        "secondary": "#395f94",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#faf9f6",
                        "surface-tint": "#745b00",
                        "primary-container": "#e6b800",
                        "surface-container-low": "#f4f3f0",
                        "surface-container-high": "#e9e8e5",
                        "inverse-on-surface": "#f2f1ee",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#9ec2fe",
                        "tertiary": "#1b6d24",
                        "on-secondary-fixed": "#001c3b",
                        "inverse-primary": "#f0c115",
                        "surface-variant": "#e3e2df",
                        "primary-fixed-dim": "#f0c115",
                        "surface": "#faf9f6",
                        "primary-fixed": "#ffe08a",
                        "tertiary-fixed": "#a3f69c",
                        "tertiary-container": "#7fd07a",
                        "on-error-container": "#93000a",
                        "on-surface": "#1b1c1a",
                        "tertiary-fixed-dim": "#88d982",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#005914",
                        "on-secondary-container": "#284f83",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#1e477b",
                        "surface-container": "#efeeeb",
                        "on-error": "#ffffff",
                        "outline-variant": "#d1c5ac",
                        "secondary-fixed": "#d5e3ff",
                        "surface-dim": "#dbdad7",
                        "on-tertiary-fixed-variant": "#005312",
                        "inverse-surface": "#2f312f",
                        "on-background": "#1b1c1a",
                        "primary": "#745b00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .loading-progress {
            background: linear-gradient(45deg, #745b00, #e6b800);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-[#faf9f6] dark:bg-stone-950 z-50">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#745b00] dark:text-[#e6b800] hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors p-2 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-stone-900 dark:text-stone-50 text-xl">Importeren</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<div class="h-[2px] w-full bg-[#efeeeb] dark:bg-stone-900 overflow-hidden">
<div class="loading-progress h-full w-1/3 rounded-full"></div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 max-w-xl mx-auto w-full">
<!-- Status Container -->
<div class="w-full text-center space-y-12">
<!-- Visual Loading State -->
<div class="relative flex items-center justify-center">
<!-- Abstract Loading Illustration -->
<div class="w-48 h-48 rounded-full bg-surface-container flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-20 bg-gradient-to-tr from-primary to-primary-container animate-pulse-soft"></div>
<span class="material-symbols-outlined text-6xl text-primary animate-bounce" style="font-variation-settings: 'wght' 200;">cloud_download</span>
</div>
<!-- Orbiting Elements -->
<div class="absolute w-64 h-64 border border-outline-variant/30 rounded-full animate-[spin_10s_linear_infinite]">
<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-surface-container-highest p-2 rounded-full shadow-sm">
<span class="material-symbols-outlined text-sm text-primary">description</span>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-3">
<h2 class="text-2xl font-semibold tracking-tight text-on-surface">Bestanden worden geïmporteerd</h2>
<p class="text-on-surface-variant leading-relaxed font-light text-lg">Een moment geduld.</p>
</div>
<!-- Progress Details -->
<div class="w-full bg-surface-container-low rounded-2xl p-6 space-y-4">
<div class="flex justify-between items-end mb-1">
<div class="text-left">
<p class="text-xs uppercase tracking-widest text-outline font-medium">Verwerking</p>
<p class="text-sm font-semibold text-on-surface">Journaal_2023_export.zip</p>
</div>
<p class="text-primary font-bold">42%</p>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="loading-progress h-full w-[42%] rounded-full transition-all duration-700 ease-out"></div>
</div>
<div class="flex items-center gap-2 text-xs text-on-surface-variant pt-2">
<span class="material-symbols-outlined text-sm">schedule</span>
<span>Nog ongeveer 30 seconden resterend</span>
</div>
</div>
</div>
<!-- Asymmetric Content Preview (Bento-style background hint) -->
<div class="mt-16 w-full grid grid-cols-2 gap-4 opacity-40 select-none grayscale pointer-events-none">
<div class="bg-surface-container-low h-32 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-outline">image</span>
</div>
<div class="bg-surface-container-low h-32 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-outline">article</span>
</div>
</div>
</main>
<!-- Contextual Footer -->
<footer class="p-8 flex justify-center">
<button class="text-on-surface-variant text-sm font-medium hover:text-primary transition-colors flex items-center gap-2 py-2 px-4 rounded-full bg-surface-container-low">
<span class="material-symbols-outlined text-sm">close</span>
            Annuleer import
        </button>
</footer>
</body></html>
