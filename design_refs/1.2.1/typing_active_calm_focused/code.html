<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#faf9f6",
              "tertiary-fixed": "#a3f69c",
              "secondary-container": "#9ec2fe",
              "surface-bright": "#faf9f6",
              "on-secondary": "#ffffff",
              "error-container": "#ffdad6",
              "inverse-on-surface": "#f2f1ee",
              "on-error-container": "#93000a",
              "primary-fixed": "#ffe08a",
              "tertiary-container": "#7fd07a",
              "surface-container-low": "#f4f3f0",
              "surface-container": "#efeeeb",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#1e477b",
              "inverse-surface": "#2f312f",
              "surface-tint": "#745b00",
              "surface-container-high": "#e9e8e5",
              "error": "#ba1a1a",
              "tertiary-fixed-dim": "#88d982",
              "on-surface": "#1b1c1a",
              "on-surface-variant": "#4e4633",
              "primary": "#745b00",
              "secondary-fixed-dim": "#a7c8ff",
              "secondary": "#395f94",
              "inverse-primary": "#f0c115",
              "on-error": "#ffffff",
              "outline-variant": "#d1c5ac",
              "outline": "#807660",
              "on-primary-container": "#5e4a00",
              "on-tertiary-fixed-variant": "#005312",
              "on-secondary-fixed": "#001c3b",
              "on-primary": "#ffffff",
              "primary-container": "#e6b800",
              "on-tertiary-fixed": "#002204",
              "tertiary": "#1b6d24",
              "on-background": "#1b1c1a",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#241a00",
              "secondary-fixed": "#d5e3ff",
              "primary-fixed-dim": "#f0c115",
              "on-tertiary-container": "#005914",
              "surface-variant": "#e3e2df",
              "on-secondary-container": "#284f83",
              "surface-dim": "#dbdad7",
              "surface": "#faf9f6",
              "on-primary-fixed-variant": "#574400"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #faf9f6; /* Matching surface color */
      }
      .cursor-blink {
        display: inline-block;
        width: 2px;
        height: 1.4em;
        background-color: #745b00;
        vertical-align: middle;
        margin-left: 2px;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        from, to { opacity: 1; }
        50% { opacity: 0; }
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar (Based on Shared Components JSON) -->
<!-- Suppression logic: Shell is suppressed as this is a focused Task-Focused/Capture screen -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f6] dark:bg-[#1a1a1a] flex justify-between items-center px-6 h-16 w-full">
<button class="text-[#745b00] dark:text-[#e6b800] font-sans text-sm tracking-tight font-medium hover:bg-[#efeeeb] dark:hover:bg-white/5 transition-colors px-2 py-1 rounded">
            Annuleer
        </button>
<h1 class="hidden">Capture</h1> <!-- Hidden headline for semantics -->
<button class="text-[#745b00] dark:text-[#e6b800] font-sans text-sm tracking-tight font-semibold hover:bg-[#efeeeb] dark:hover:bg-white/5 transition-colors px-2 py-1 rounded">
            Klaar
        </button>
</header>
<!-- Main Content Canvas: Writing Surface -->
<main class="flex-grow pt-24 px-8 md:px-16 lg:px-32 max-w-4xl mx-auto w-full overflow-y-auto">
<article class="relative min-h-[530px] focus-within:outline-none">
<!-- Text Content -->
<div class="text-on-surface text-xl md:text-2xl leading-relaxed font-body whitespace-pre-wrap select-none">
                De ochtend begon met een ongewone stilte in de studio. Terwijl het licht langzaam verschoof...<span class="cursor-blink"></span>
</div>
<!-- Hidden Input for accessibility/structure simulation -->
<textarea aria-label="Reflection Input" autofocus="" class="absolute inset-0 opacity-0 w-full h-full cursor-text"></textarea>
</article>
</main>
<!-- Contextual Action: Microphone Button -->
<!-- Positioned bottom center, above the system keyboard area -->
<footer class="w-full flex flex-col items-center pb-32 pt-8">
<div class="relative">
<button class="flex flex-col items-center justify-center text-[#745b00]/40 w-12 h-12 hover:scale-105 transition-transform duration-300 ease-out active:scale-95">
<span class="material-symbols-outlined text-primary-container text-3xl" data-icon="mic">mic</span>
<span class="sr-only">Voice Capture</span>
</button>
</div>
</footer>
<!-- BottomNavBar Suppression Check: 
         This is a task-focused sub-page (Capture). 
         BottomNavBar is suppressed to prioritize the content canvas per UI guidelines.
    -->
<!-- Aesthetic Decorative Element (Quiet Curator) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-40">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-gradient-to-bl from-primary/5 to-transparent rounded-full blur-[100px]"></div>
<div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-gradient-to-tr from-primary/5 to-transparent rounded-full blur-[120px]"></div>
</div>
</body></html>
