<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inloggen - Persoonlijke Assistent App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#a3f69c",
              "surface-variant": "#e3e2df",
              "on-primary": "#ffffff",
              "surface": "#faf9f6",
              "tertiary-container": "#7fd07a",
              "on-tertiary-fixed": "#002204",
              "surface-container-highest": "#e3e2df",
              "error": "#ba1a1a",
              "primary": "#745b00",
              "outline-variant": "#d1c5ac",
              "on-secondary-fixed-variant": "#1e477b",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "inverse-surface": "#2f312f",
              "on-surface-variant": "#4e4633",
              "on-primary-container": "#5e4a00",
              "on-error": "#ffffff",
              "surface-container-high": "#e9e8e5",
              "surface-dim": "#dbdad7",
              "surface-bright": "#faf9f6",
              "secondary-fixed": "#d5e3ff",
              "on-primary-fixed": "#241a00",
              "secondary-container": "#9ec2fe",
              "secondary": "#395f94",
              "on-secondary-container": "#284f83",
              "primary-container": "#e6b800",
              "inverse-on-surface": "#f2f1ee",
              "on-primary-fixed-variant": "#574400",
              "error-container": "#ffdad6",
              "on-tertiary-fixed-variant": "#005312",
              "on-tertiary-container": "#005914",
              "tertiary": "#1b6d24",
              "outline": "#807660",
              "on-secondary": "#ffffff",
              "primary-fixed": "#ffe08a",
              "inverse-primary": "#f0c115",
              "on-secondary-fixed": "#001c3b",
              "background": "#faf9f6",
              "surface-container-low": "#f4f3f0",
              "on-surface": "#1b1c1a",
              "on-tertiary": "#ffffff",
              "surface-container": "#efeeeb",
              "surface-tint": "#745b00",
              "on-background": "#1b1c1a",
              "primary-fixed-dim": "#f0c115",
              "tertiary-fixed-dim": "#88d982",
              "secondary-fixed-dim": "#a7c8ff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(45deg, #745b00 0%, #e6b800 100%);
        }
        .error-tint {
            background-color: rgba(198, 40, 40, 0.08);
            border: 1px solid rgba(198, 40, 40, 0.2);
        }
        .error-text {
            color: #C62828;
        }
        .error-input-focus {
            border-color: rgba(198, 40, 40, 0.5) !important;
            box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.1) !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell Implementation -->
<header class="w-full top-0 left-0 bg-[#faf9f6] dark:bg-stone-950 fixed z-50">
<div class="flex items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
<button class="material-symbols-outlined text-[#e6b800] dark:text-[#f0d060] hover:bg-stone-100 dark:hover:bg-stone-900 transition-colors p-2 rounded-full active:scale-95 duration-200 ease-in-out">
                arrow_back
            </button>
<div class="ml-4 flex flex-col">
<span class="text-lg font-bold text-[#745b00] dark:text-[#e6b800] tracking-tight font-headline">Persoonlijke Assistent</span>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md">
<!-- Branding/Hero Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high mb-6">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">person_search</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-on-surface mb-2 font-headline">Welkom terug</h1>
<p class="text-on-surface-variant leading-relaxed">Log in om verder te gaan met uw dagelijkse reflecties.</p>
</div>
<!-- Focused Error Block -->
<div class="error-tint rounded-xl p-4 mb-8 flex items-start gap-3">
<span class="material-symbols-outlined error-text mt-0.5" style="font-size: 20px;">error</span>
<p class="text-sm font-medium error-text leading-tight">
                    Oeps, dat e-mailadres lijkt niet te kloppen. Controleer het nog even.
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-1.5">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant uppercase ml-1" for="email">E-mailadres</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-xl focus:ring-0 focus:outline-none error-input-focus transition-all text-on-surface placeholder:text-outline" id="email" placeholder="naam@voorbeeld.nl" type="email" value="gebruiker@email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant uppercase" for="password">Wachtwoord</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Vergeten?</a>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all text-on-surface placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="signature-gradient w-full py-4 rounded-full text-white font-bold text-lg shadow-xl shadow-primary/10 hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                    Inloggen
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant">
                    Nog geen account? 
                    <a class="font-bold text-primary hover:underline ml-1" href="#">Nu registreren</a>
</p>
</div>
<!-- Footer Decorative Element -->
<div class="mt-16 pt-8 flex flex-col items-center opacity-40">
<div class="w-1 h-8 rounded-full bg-outline-variant mb-4"></div>
<p class="text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant">De Stille Curator</p>
</div>
</div>
</main>
<!-- Shell Suppression: Login screens are focused journeys, BottomNavBar suppressed per rules. -->
</body></html>
