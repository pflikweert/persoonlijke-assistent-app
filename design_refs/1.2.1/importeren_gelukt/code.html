<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#002204",
                    "background": "#faf9f6",
                    "surface-container-highest": "#e3e2df",
                    "on-primary-fixed-variant": "#574400",
                    "outline": "#807660",
                    "secondary-fixed-dim": "#a7c8ff",
                    "on-primary-fixed": "#241a00",
                    "on-primary-container": "#5e4a00",
                    "on-surface-variant": "#4e4633",
                    "secondary": "#395f94",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#faf9f6",
                    "surface-tint": "#745b00",
                    "primary-container": "#e6b800",
                    "surface-container-low": "#f4f3f0",
                    "surface-container": "#efeeeb",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#9ec2fe",
                    "tertiary": "#1b6d24",
                    "on-secondary-fixed": "#001c3b",
                    "inverse-primary": "#f0c115",
                    "surface-variant": "#e3e2df",
                    "primary-fixed-dim": "#f0c115",
                    "surface": "#faf9f6",
                    "primary-fixed": "#ffe08a",
                    "tertiary-fixed": "#a3f69c",
                    "tertiary-container": "#7fd07a",
                    "on-error-container": "#93000a",
                    "on-surface": "#1b1c1a",
                    "tertiary-fixed-dim": "#88d982",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "on-tertiary-container": "#005914",
                    "on-secondary-container": "#284f83",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#1e477b",
                    "surface-container": "#efeeeb",
                    "on-error": "#ffffff",
                    "outline-variant": "#d1c5ac",
                    "secondary-fixed": "#d5e3ff",
                    "surface-dim": "#dbdad7",
                    "on-tertiary-fixed-variant": "#005312",
                    "inverse-surface": "#2f312f",
                    "on-background": "#1b1c1a",
                    "primary": "#745b00"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-cta-gradient {
            background: linear-gradient(45deg, #745b00 0%, #e6b800 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-[#faf9f6] dark:bg-stone-950 flex items-center justify-between px-6 py-4 w-full z-50">
<div class="flex items-center gap-4">
<button class="text-[#745b00] dark:text-[#e6b800] hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors p-2 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-stone-900 dark:text-stone-50 text-lg">Settings</h1>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Hero Illustration/Icon Section -->
<div class="mb-12 relative">
<div class="absolute inset-0 bg-primary-container/20 blur-3xl rounded-full"></div>
<div class="relative w-32 h-32 flex items-center justify-center bg-surface-container rounded-full">
<span class="material-symbols-outlined text-6xl text-primary" data-icon="check_circle_outline" style="font-variation-settings: 'opsz' 48;">check_circle_outline</span>
</div>
</div>
<!-- Content -->
<div class="space-y-4 mb-12">
<span class="text-sm font-label tracking-widest text-primary uppercase font-semibold">Importeren</span>
<h2 class="text-3xl font-headline font-bold tracking-tight text-on-surface">Importeren gelukt</h2>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-xs mx-auto">
                    Je bestanden zijn toegevoegd aan je archief.
                </p>
</div>
<!-- Action Section -->
<div class="w-full space-y-6 flex flex-col items-center">
<!-- Primary CTA: Signature Component -->
<button class="signature-cta-gradient text-white font-semibold py-4 px-10 rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center gap-3 group w-full justify-center">
<span>Terug naar instellingen</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Action -->
<button class="text-on-surface-variant font-medium hover:text-primary transition-colors py-2 px-6 active:scale-95 transition-transform duration-200 flex items-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="add_circle">add_circle</span>
<span>Nog meer importeren</span>
</button>
</div>
<!-- Success Summary Visualization (Bento-lite) -->
<div class="mt-16 w-full grid grid-cols-1 gap-4 text-left">
<div class="bg-surface-container-low p-6 rounded-3xl flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="folder_zip">folder_zip</span>
</div>
<div>
<p class="text-sm text-on-surface-variant font-medium">Archief status</p>
<p class="text-on-surface font-semibold">Gevirtualiseerd</p>
</div>
</div>
<span class="material-symbols-outlined text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="done_all">done_all</span>
</div>
</div>
</div>
</main>
<!-- Footer Decorative Gradient -->
<div class="h-1 w-full bg-surface-container-highest relative overflow-hidden">
<div class="absolute left-0 top-0 h-full w-1/3 signature-cta-gradient"></div>
</div>
</body></html>
