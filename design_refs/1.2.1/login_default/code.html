<!DOCTYPE html>

<html lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#a3f69c",
              "surface-variant": "#e3e2df",
              "on-primary": "#ffffff",
              "surface": "#faf9f6",
              "tertiary-container": "#7fd07a",
              "on-tertiary-fixed": "#002204",
              "surface-container-highest": "#e3e2df",
              "error": "#ba1a1a",
              "primary": "#745b00",
              "outline-variant": "#d1c5ac",
              "on-secondary-fixed-variant": "#1e477b",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "inverse-surface": "#2f312f",
              "on-surface-variant": "#4e4633",
              "on-primary-container": "#5e4a00",
              "on-error": "#ffffff",
              "surface-container-high": "#e9e8e5",
              "surface-dim": "#dbdad7",
              "surface-bright": "#faf9f6",
              "secondary-fixed": "#d5e3ff",
              "on-primary-fixed": "#241a00",
              "secondary-container": "#9ec2fe",
              "secondary": "#395f94",
              "on-secondary-container": "#284f83",
              "primary-container": "#e6b800",
              "inverse-on-surface": "#f2f1ee",
              "on-primary-fixed-variant": "#574400",
              "error-container": "#ffdad6",
              "on-tertiary-fixed-variant": "#005312",
              "on-tertiary-container": "#005914",
              "tertiary": "#1b6d24",
              "outline": "#807660",
              "on-secondary": "#ffffff",
              "primary-fixed": "#ffe08a",
              "inverse-primary": "#f0c115",
              "on-secondary-fixed": "#001c3b",
              "background": "#faf9f6",
              "surface-container-low": "#f4f3f0",
              "on-surface": "#1b1c1a",
              "on-tertiary": "#ffffff",
              "surface-container": "#efeeeb",
              "surface-tint": "#745b00",
              "on-background": "#1b1c1a",
              "primary-fixed-dim": "#f0c115",
              "tertiary-fixed-dim": "#88d982",
              "secondary-fixed-dim": "#a7c8ff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #faf9f6;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface antialiased">
<!-- Suppression of Navigation Shell as per Transactional Rule -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Top Brand Mark -->
<header class="mb-16">
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</header>
<section class="max-w-md w-full flex flex-col items-center text-center">
<!-- Headline & Subtext -->
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-6 leading-tight">
        Welkom bij je eigen ruimte
      </h1>
<p class="text-on-surface-variant text-lg leading-relaxed mb-12">
        Een plek voor je gedachten, dromen en reflecties. Vul je e-mailadres in om verder te gaan.
      </p>
<!-- Interaction Zone -->
<form class="w-full space-y-6">
<div class="relative w-full">
<input class="w-full px-6 py-5 rounded-xl border-0 bg-surface-container-low focus:bg-surface-container text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all duration-300 text-lg shadow-sm" placeholder="Je e-mailadres" type="email"/>
</div>
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-semibold text-lg flex items-center justify-center gap-3 shadow-lg shadow-primary/10 hover:brightness-110 active:scale-[0.98] transition-all duration-200" type="submit">
<span>Ontvang inloglink</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Footnote -->
<footer class="mt-8">
<p class="text-sm text-outline font-medium max-w-xs mx-auto leading-normal">
          We sturen je een e-mail met een link waarmee je direct en veilig kunt inloggen.
        </p>
</footer>
</section>
<!-- Decorative Subtle Visual -->
<div class="mt-24 opacity-40">
<div class="w-64 h-64 blur-3xl rounded-full bg-gradient-to-tr from-primary-container/20 to-secondary-container/20" data-alt="soft warm aesthetic light leak with mineral tones and gentle glow on a paper-like background"></div>
</div>
</main>
<!-- Legal/Footer Links -->
<aside class="fixed bottom-8 w-full text-center">
<nav class="flex justify-center space-x-6 text-xs font-medium text-outline">
<a class="hover:text-primary transition-colors" href="#">Privacybeleid</a>
<a class="hover:text-primary transition-colors" href="#">Gebruiksvoorwaarden</a>
</nav>
</aside>
</body></html>
