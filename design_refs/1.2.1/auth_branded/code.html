<!DOCTYPE html>

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center selection:bg-primary-container selection:text-on-primary-container safe-p-top">
<!-- Compact Branding Header -->
<header class="w-full flex justify-center items-center px-6 pt-12 pb-8">
<div class="w-12 h-12 rounded-xl overflow-hidden">
<img alt="Budio Vandaag" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0ugDcKVDXBlpQxG8QxK3GMyME3Hhp-GR8rRl1Mv03-3C4-50dIJSGLQ0ICrxrIdaOtCeEU_MtqAOvlYAWSlB-yi-A1pwTKRSkGXNEPhjbKfy6HST-iwe8GEdw7D-d8sl5ChbVSCrlaS0In2WG9fNdfEBu5ZbAv_PGt5f4URaYUmAUMHDfRQ1Q_gp7eVi4u37Ez9N5Kbg0knspBGg0FoPeBv-j3SqdsMqIufID7dUyzE922bKutRpbDw5hmu1tboybG1BZqCFFS_fU4s"/>
</div>
</header>
<!-- Main Content Area -->
<main class="w-full max-w-sm px-8 flex flex-col flex-grow">
<!-- Hero Section -->
<section class="mt-8 text-center space-y-4">
<h1 class="text-3xl font-bold tracking-tight text-on-surface leading-tight">
                Vang je dag in woorden
            </h1>
<p class="text-on-surface-variant text-base font-normal leading-relaxed">
                Voor momenten, gedachten en gebeurtenissen die je niet kwijt wilt raken.
            </p>
</section>
<!-- Auth Form Section -->
<section class="mt-12 w-full">
<div class="space-y-8">
<div class="space-y-3">
<p class="text-sm text-center text-on-surface-variant">
                        Vul je e-mailadres in om een inloglink te ontvangen.
                    </p>
<div class="group">
<label class="sr-only" for="email">E-mailadres</label>
<input class="w-full bg-surface-container-low border border-outline-variant/30 focus:border-primary-container focus:ring-4 focus:ring-primary-container/10 rounded-xl py-4 px-5 text-on-surface placeholder:text-outline text-base transition-all outline-none" id="email" name="email" placeholder="jouw@email.nl" required="" type="email"/>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-semibold py-4 rounded-full primary-cta-shadow hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Ontvang inloglink</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</section>
<!-- Footnote -->
<footer class="mt-auto py-12 text-center">
<p class="text-on-surface-variant/60 text-xs font-normal max-w-[240px] mx-auto leading-relaxed">

            </p>
</footer>
</main>
<!-- Ambient Subtle Tonal Background -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -right-[20%] w-[300px] h-[300px] bg-primary-container/5 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[5%] -left-[10%] w-[250px] h-[250px] bg-primary-container/3 blur-[80px] rounded-full"></div>
</div>
