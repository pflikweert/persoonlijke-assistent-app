<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-tertiary-fixed": "#002204",
            "background": "#faf9f6",
            "surface-container-highest": "#e3e2df",
            "on-primary-fixed-variant": "#574400",
            "outline": "#807660",
            "secondary-fixed-dim": "#a7c8ff",
            "on-primary-fixed": "#241a00",
            "on-primary-container": "#5e4a00",
            "on-surface-variant": "#4e4633",
            "secondary": "#395f94",
            "on-secondary": "#ffffff",
            "surface-bright": "#faf9f6",
            "surface-tint": "#745b00",
            "primary-container": "#e6b800",
            "surface-container-low": "#f4f3f0",
            "surface-container": "#efeeeb",
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#9ec2fe",
            "tertiary": "#1b6d24",
            "on-secondary-fixed": "#001c3b",
            "inverse-primary": "#f0c115",
            "surface-variant": "#e3e2df",
            "primary-fixed-dim": "#f0c115",
            "surface": "#faf9f6",
            "primary-fixed": "#ffe08a",
            "tertiary-fixed": "#a3f69c",
            "tertiary-container": "#7fd07a",
            "on-error-container": "#93000a",
            "on-surface": "#1b1c1a",
            "tertiary-fixed-dim": "#88d982",
            "on-tertiary": "#ffffff",
            "error": "#ba1a1a",
            "on-tertiary-container": "#005914",
            "on-secondary-container": "#284f83",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#1e477b",
            "surface-container": "#efeeeb",
            "on-error": "#ffffff",
            "outline-variant": "#d1c5ac",
            "secondary-fixed": "#d5e3ff",
            "surface-dim": "#dbdad7",
            "on-tertiary-fixed-variant": "#005312",
            "inverse-surface": "#2f312f",
            "on-background": "#1b1c1a",
            "primary": "#745b00"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .gold-gradient {
      background: linear-gradient(45deg, #745b00 0%, #e6b800 100%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="w-full sticky top-0 bg-[#faf9f6] dark:bg-stone-950 flex items-center justify-between px-6 py-4 z-50">
<div class="flex items-center gap-4">
<button class="hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors p-2 rounded-full active:scale-95 transition-transform duration-200 text-stone-500 dark:text-stone-400">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-stone-900 dark:text-stone-50 text-xl">Settings</h1>
</div>
<div class="flex items-center">
<!-- Empty space for symmetry as per TopAppBar small type -->
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 max-w-2xl mx-auto w-full text-center">
<!-- Success Illustration/Status Area -->
<div class="relative mb-12">
<div class="absolute inset-0 bg-primary/5 blur-3xl rounded-full"></div>
<div class="relative flex flex-col items-center">
<div class="w-32 h-32 rounded-full bg-surface-container flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'wght' 300;">check_circle_outline</span>
</div>
<div class="space-y-2">
<span class="text-primary font-label tracking-widest uppercase text-xs font-semibold">Download klaar</span>
<h2 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface mb-2">Archief downloaden</h2>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto">
            Je bestand staat voor je klaar.
          </p>
</div>
</div>
</div>
<!-- Info Detail Card (Minimalist Bento Style) -->
<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 mb-12 text-left">
<div class="p-6 bg-surface-container-low rounded-xl flex flex-col gap-2">
<span class="material-symbols-outlined text-primary text-xl">file_present</span>
<div>
<p class="text-xs text-on-surface-variant font-medium uppercase tracking-wider">Bestandstype</p>
<p class="font-semibold">ZIP Archief (.zip)</p>
</div>
</div>
<div class="p-6 bg-surface-container-low rounded-xl flex flex-col gap-2">
<span class="material-symbols-outlined text-primary text-xl">event</span>
<div>
<p class="text-xs text-on-surface-variant font-medium uppercase tracking-wider">Vervaldatum</p>
<p class="font-semibold">Geldig tot 24 Oct 2023</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col items-center gap-6">
<!-- Primary CTA -->
<button class="gold-gradient text-white font-semibold py-4 px-10 rounded-full flex items-center gap-3 shadow-xl shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all w-full md:w-auto justify-center">
<span class="material-symbols-outlined">download</span>
        Download opnieuw
      </button>
<!-- Secondary Action -->
<button class="text-on-surface-variant hover:text-on-surface font-medium transition-colors flex items-center gap-2 py-2 px-4 rounded-lg hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-sm">settings</span>
        Terug naar instellingen
      </button>
</div>
</main>
<!-- Visual Decoration for Tonal Depth -->
<div class="fixed bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-surface-container-low/50 to-transparent -z-10 pointer-events-none"></div>
<!-- Decorative Abstract Element (The Quiet Curator aesthetic) -->
<div class="fixed top-20 right-[10%] w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-20 left-[5%] w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
