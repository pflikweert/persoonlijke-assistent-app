<!DOCTYPE html>

<html lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-tertiary-fixed": "#002204",
                "background": "#faf9f6",
                "surface-container-highest": "#e3e2df",
                "on-primary-fixed-variant": "#574400",
                "outline": "#807660",
                "secondary-fixed-dim": "#a7c8ff",
                "on-primary-fixed": "#241a00",
                "on-primary-container": "#5e4a00",
                "on-surface-variant": "#4e4633",
                "secondary": "#395f94",
                "on-secondary": "#ffffff",
                "surface-bright": "#faf9f6",
                "surface-tint": "#745b00",
                "primary-container": "#e6b800",
                "surface-container-low": "#f4f3f0",
                "surface-container-high": "#e9e8e5",
                "inverse-on-surface": "#f2f1ee",
                "on-primary": "#ffffff",
                "surface-container-lowest": "#ffffff",
                "secondary-container": "#9ec2fe",
                "tertiary": "#1b6d24",
                "on-secondary-fixed": "#001c3b",
                "inverse-primary": "#f0c115",
                "surface-variant": "#e3e2df",
                "primary-fixed-dim": "#f0c115",
                "surface": "#faf9f6",
                "primary-fixed": "#ffe08a",
                "tertiary-fixed": "#a3f69c",
                "tertiary-container": "#7fd07a",
                "on-error-container": "#93000a",
                "on-surface": "#1b1c1a",
                "tertiary-fixed-dim": "#88d982",
                "on-tertiary": "#ffffff",
                "error": "#ba1a1a",
                "on-tertiary-container": "#005914",
                "on-secondary-container": "#284f83",
                "error-container": "#ffdad6",
                "on-secondary-fixed-variant": "#1e477b",
                "surface-container": "#efeeeb",
                "on-error": "#ffffff",
                "outline-variant": "#d1c5ac",
                "secondary-fixed": "#d5e3ff",
                "surface-dim": "#dbdad7",
                "on-tertiary-fixed-variant": "#005312",
                "inverse-surface": "#2f312f",
                "on-background": "#1b1c1a",
                "primary": "#745b00"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<header class="w-full sticky top-0 bg-[#faf9f6] dark:bg-stone-950 flex items-center justify-between px-6 py-4 w-full z-50">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 text-[#745b00] dark:text-[#e6b800] hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-stone-900 dark:text-stone-50 text-lg">Archief downloaden</h1>
</div>
</header>
<main class="min-h-[calc(100vh-72px)] flex flex-col items-center justify-center p-6 text-center max-w-lg mx-auto">
<div class="relative mb-12">
<div class="absolute inset-0 bg-error/10 blur-3xl rounded-full scale-150"></div>
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-error-container text-on-error-container">
<span class="material-symbols-outlined text-5xl" data-icon="warning">warning</span>
</div>
</div>
<div class="space-y-4 mb-12">
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface">Er ging iets mis.</h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-normal">
                Het was niet mogelijk om je archief voor te bereiden. Probeer het opnieuw.
            </p>
</div>
<div class="w-full max-w-sm space-y-4">
<button class="w-full h-14 bg-gradient-to-r from-[#745b00] to-[#e6b800] text-white rounded-full flex items-center justify-center gap-3 font-semibold text-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                Probeer opnieuw
            </button>
<button class="w-full h-14 bg-surface-container-low text-on-surface-variant rounded-full flex items-center justify-center font-medium hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-200">
                Annuleren
            </button>
</div>
<div class="mt-16 w-full p-6 bg-surface-container-lowest rounded-2xl border border-outline-variant/30 text-left">
<div class="flex items-start gap-4">
<div class="p-2 bg-surface-container rounded-xl text-primary">
<span class="material-symbols-outlined" data-icon="info">info</span>
</div>
<div>
<h3 class="font-semibold text-on-surface text-sm mb-1">Wat gebeurt er nu?</h3>
<p class="text-on-surface-variant text-sm leading-snug">
                        Als dit probleem aanhoudt, controleer dan je internetverbinding of neem contact op met ondersteuning.
                    </p>
</div>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 h-2 bg-gradient-to-r from-error/40 via-surface-container to-error/40 opacity-20 pointer-events-none"></div>
</body></html>
