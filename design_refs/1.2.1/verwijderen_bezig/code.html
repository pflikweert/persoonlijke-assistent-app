<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-tertiary-fixed": "#002204",
            "background": "#faf9f6",
            "surface-container-highest": "#e3e2df",
            "on-primary-fixed-variant": "#574400",
            "outline": "#807660",
            "secondary-fixed-dim": "#a7c8ff",
            "on-primary-fixed": "#241a00",
            "on-primary-container": "#5e4a00",
            "on-surface-variant": "#4e4633",
            "secondary": "#395f94",
            "on-secondary": "#ffffff",
            "surface-bright": "#faf9f6",
            "surface-tint": "#745b00",
            "primary-container": "#e6b800",
            "surface-container-low": "#f4f3f0",
            "surface-container": "#efeeeb",
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#9ec2fe",
            "tertiary": "#1b6d24",
            "on-secondary-fixed": "#001c3b",
            "inverse-primary": "#f0c115",
            "surface-variant": "#e3e2df",
            "primary-fixed-dim": "#f0c115",
            "surface": "#faf9f6",
            "primary-fixed": "#ffe08a",
            "tertiary-fixed": "#a3f69c",
            "tertiary-container": "#7fd07a",
            "on-error-container": "#93000a",
            "on-surface": "#1b1c1a",
            "tertiary-fixed-dim": "#88d982",
            "on-tertiary": "#ffffff",
            "error": "#ba1a1a",
            "on-tertiary-container": "#005914",
            "on-secondary-container": "#284f83",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#1e477b",
            "surface-container": "#efeeeb",
            "on-error": "#ffffff",
            "outline-variant": "#d1c5ac",
            "secondary-fixed": "#d5e3ff",
            "surface-dim": "#dbdad7",
            "on-tertiary-fixed-variant": "#005312",
            "inverse-surface": "#2f312f",
            "on-background": "#1b1c1a",
            "primary": "#745b00"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 2s linear infinite;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body antialiased">
<!-- Shell: TopAppBar (Shared Component) -->
<header class="w-full sticky top-0 bg-[#faf9f6] flex items-center justify-between px-6 py-4 w-full z-10">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 hover:bg-stone-200/50 transition-colors active:scale-95 transition-transform duration-200 rounded-full">
<span class="material-symbols-outlined text-stone-900">arrow_back</span>
</button>
<h1 class="font-headline font-semibold tracking-tight text-stone-900 text-lg">Settings</h1>
</div>
</header>
<main class="max-w-md mx-auto px-6 pt-4 pb-24">
<!-- Background Content (Mocked Settings Context) -->
<div class="opacity-30 pointer-events-none space-y-8">
<div class="space-y-4">
<h2 class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Account</h2>
<div class="bg-surface-container rounded-xl p-4 space-y-6">
<div class="flex justify-between items-center">
<span class="font-medium">Profile Information</span>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</div>
<div class="flex justify-between items-center">
<span class="font-medium">Email Notifications</span>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</div>
</div>
</div>
<div class="space-y-4">
<h2 class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Data &amp; Privacy</h2>
<div class="bg-surface-container rounded-xl p-4 space-y-6">
<div class="flex justify-between items-center">
<span class="font-medium">Download my data</span>
<span class="material-symbols-outlined text-on-surface-variant">download</span>
</div>
<div class="flex justify-between items-center text-error">
<span class="font-medium">Delete account</span>
<span class="material-symbols-outlined">delete</span>
</div>
</div>
</div>
</div>
<!-- Blocking State Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-stone-900/10 backdrop-blur-[2px]">
<div class="w-full max-w-xs bg-surface-container-lowest rounded-[2rem] p-8 shadow-2xl flex flex-col items-center text-center">
<!-- Subtle Loader -->
<div class="relative w-16 h-16 mb-8 flex items-center justify-center">
<div class="absolute inset-0 border-4 border-surface-container-highest rounded-full"></div>
<div class="absolute inset-0 border-4 border-primary border-t-transparent rounded-full animate-spin-slow"></div>
<span class="material-symbols-outlined text-primary text-3xl">delete_sweep</span>
</div>
<!-- Content -->
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-2">Verwijderen</h2>
<p class="text-on-surface-variant leading-relaxed mb-6">
          Je gegevens worden verwijderd. Dit kan een moment duren.
        </p>
<!-- Decorative Progress Indicator -->
<div class="w-full h-1 bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-[#745b00] to-[#e6b800] w-1/2 rounded-full opacity-80"></div>
</div>
<p class="mt-8 text-[10px] font-label uppercase tracking-[0.2em] text-on-surface-variant opacity-50">
          Bezig met verwerken
        </p>
</div>
</div>
</main>
<!-- Shell: Bottom Navigation (Hidden on this focused screen per rules) -->
</body></html>
