<!DOCTYPE html>

<html lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-tertiary-fixed": "#002204",
                "background": "#faf9f6",
                "surface-container-highest": "#e3e2df",
                "on-primary-fixed-variant": "#574400",
                "outline": "#807660",
                "secondary-fixed-dim": "#a7c8ff",
                "on-primary-fixed": "#241a00",
                "on-primary-container": "#5e4a00",
                "on-surface-variant": "#4e4633",
                "secondary": "#395f94",
                "on-secondary": "#ffffff",
                "surface-bright": "#faf9f6",
                "surface-tint": "#745b00",
                "primary-container": "#e6b800",
                "surface-container-low": "#f4f3f0",
                "surface-container-high": "#e9e8e5",
                "inverse-on-surface": "#f2f1ee",
                "on-primary": "#ffffff",
                "surface-container-lowest": "#ffffff",
                "secondary-container": "#9ec2fe",
                "tertiary": "#1b6d24",
                "on-secondary-fixed": "#001c3b",
                "inverse-primary": "#f0c115",
                "surface-variant": "#e3e2df",
                "primary-fixed-dim": "#f0c115",
                "surface": "#faf9f6",
                "primary-fixed": "#ffe08a",
                "tertiary-fixed": "#a3f69c",
                "tertiary-container": "#7fd07a",
                "on-error-container": "#93000a",
                "on-surface": "#1b1c1a",
                "tertiary-fixed-dim": "#88d982",
                "on-tertiary": "#ffffff",
                "error": "#ba1a1a",
                "on-tertiary-container": "#005914",
                "on-secondary-container": "#284f83",
                "error-container": "#ffdad6",
                "on-secondary-fixed-variant": "#1e477b",
                "surface-container": "#efeeeb",
                "on-error": "#ffffff",
                "outline-variant": "#d1c5ac",
                "secondary-fixed": "#d5e3ff",
                "surface-dim": "#dbdad7",
                "on-tertiary-fixed-variant": "#005312",
                "inverse-surface": "#2f312f",
                "on-background": "#1b1c1a",
                "primary": "#745b00"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cta-gradient {
            background: linear-gradient(45deg, #745b00, #e6b800);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar from JSON -->
<header class="w-full sticky top-0 bg-[#faf9f6] dark:bg-stone-950 flex items-center justify-between px-6 py-4 z-50">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors active:scale-95 transition-transform duration-200 text-[#745b00] dark:text-[#e6b800]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-stone-900 dark:text-stone-50 text-xl">Settings</h1>
</div>
</header>
<main class="w-full max-w-2xl flex-grow px-6 py-8">
<!-- Hero Section -->
<section class="mb-12">
<h2 class="text-3xl font-bold tracking-tight text-on-surface mb-2">Instellingen</h2>
<p class="text-on-surface-variant text-lg leading-relaxed">Beheer je archief en gegevens.</p>
</section>
<!-- Content Area: Tonal layout without borders -->
<div class="space-y-10">
<!-- Sectie: Archief -->
<section>
<div class="px-2 mb-4">
<h3 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant opacity-70">Archief</h3>
</div>
<div class="space-y-2">
<!-- Item 1: Archief downloaden -->
<button class="w-full flex items-center justify-between p-5 rounded-2xl bg-surface-container-low hover:bg-surface-container transition-colors group">
<div class="flex flex-col items-start text-left">
<span class="font-semibold text-on-surface">Archief downloaden</span>
<span class="text-sm text-on-surface-variant">Bewaar een leesbaar bestand van je archief.</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Item 2: Importeren -->
<button class="w-full flex items-center justify-between p-5 rounded-2xl bg-surface-container-low hover:bg-surface-container transition-colors group">
<div class="flex flex-col items-start text-left">
<span class="font-semibold text-on-surface">Importeren</span>
<span class="text-sm text-on-surface-variant">Importeer eerder geschreven bestanden.</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
</section>
<!-- Sectie: Gegevens verwijderen -->
<section>
<div class="px-2 mb-4">
<h3 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant opacity-70">Gegevens verwijderen</h3>
</div>
<div class="bg-error-container/20 rounded-3xl p-1">
<button class="w-full flex items-center justify-between p-5 rounded-2xl bg-surface-container-low hover:bg-error-container/30 transition-colors group">
<div class="flex flex-col items-start text-left">
<span class="font-semibold text-error">Verwijder alles</span>
<span class="text-sm text-on-surface-variant">Verwijder je momenten, dagen en reflecties.</span>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">delete_forever</span>
<span class="material-symbols-outlined text-outline opacity-40">chevron_right</span>
</div>
</button>
</div>
</section>
</div>
<!-- Visual Anchor: Quiet Curator Aesthetic -->
<div class="mt-20 flex flex-col items-center opacity-20 grayscale pointer-events-none">
<div class="w-16 h-[1px] bg-outline mb-6"></div>
<p class="text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">The Quiet Curator</p>
</div>
</main>
<!-- Suppressed BottomNavBar & FAB per instructions for "Task-Focused" screens -->
</body></html>
