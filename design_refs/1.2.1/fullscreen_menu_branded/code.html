<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f4;
            color: #1b1c19;
            -webkit-font-smoothing: antialiased;
        }
        .bg-ambient {
            background: radial-gradient(120% 90% at 20% 0%, #FFFFFF 0%, #FAF9F4 52%, #F1EEE6 100%),
                        linear-gradient(180deg, rgba(230, 184, 0, 0.12) 0%, rgba(230, 184, 0, 0) 42%, rgba(214, 194, 152, 0.18) 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400;
        }

<body class="antialiased text-on-surface">
<main class="min-h-screen flex flex-col bg-ambient overflow-hidden">
<!-- Header: Exact style from SCREEN_235 -->
<header class="bg-transparent flex justify-between items-center px-6 h-20 w-full z-50">
<div class="flex items-center gap-1">
<span class="text-xl font-bold tracking-tight text-[#1B1C1A]">Budio</span>
<span class="text-xl font-normal tracking-tight text-[#736A56]">Vandaag</span>
</div>
<button aria-label="Sluit menu" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 transition-colors active:scale-95 duration-140">
<span class="material-symbols-outlined text-on-surface-variant text-[24px]" data-icon="close">close</span>
</button>
</header>
<!-- Navigation Content -->
<nav class="flex-grow flex flex-col px-8 pt-12">
<!-- Main Navigation List -->
<div class="space-y-2">
<!-- Vandaag (Active State: Refined and Intentional) -->
<a class="flex items-center group py-4 relative" href="#">
<div class="flex items-center space-x-6 text-primary">
<span class="material-symbols-outlined text-[28px] active-icon" data-icon="today">today</span>
<span class="text-[28px] font-bold tracking-tight">Vandaag</span>
</div>
<!-- Refined active indicator dot -->
<div class="absolute -left-4 w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_rgba(230,184,0,0.6)]"></div>
</a>
<!-- Vastleggen -->
<a class="flex items-center py-4 group transition-all duration-200 hover:translate-x-1" href="#">
<div class="flex items-center space-x-6 text-on-surface-variant group-hover:text-on-surface">
<span class="material-symbols-outlined text-[28px]" data-icon="mic_none">mic_none</span>
<span class="text-[28px] font-medium tracking-tight">Vastleggen</span>
</div>
</a>
<!-- Dagen -->
<a class="flex items-center py-4 group transition-all duration-200 hover:translate-x-1" href="#">
<div class="flex items-center space-x-6 text-on-surface-variant group-hover:text-on-surface">
<span class="material-symbols-outlined text-[28px]" data-icon="calendar_today">calendar_today</span>
<span class="text-[28px] font-medium tracking-tight">Dagen</span>
</div>
</a>
<!-- Reflecties -->
<a class="flex items-center py-4 group transition-all duration-200 hover:translate-x-1" href="#">
<div class="flex items-center space-x-6 text-on-surface-variant group-hover:text-on-surface">
<span class="material-symbols-outlined text-[28px]" data-icon="auto_awesome">auto_awesome</span>
<span class="text-[28px] font-medium tracking-tight">Reflecties</span>
</div>
</a>
</div>
<!-- Spacer to balance vertical rhythm -->
<div class="flex-grow"></div>
<!-- Secondary Navigation & Footer -->
<div class="pb-12 space-y-8">
<!-- Divider -->
<div class="h-[1px] w-12 bg-outline-variant opacity-30"></div>
<div class="space-y-6">
<!-- Instellingen (Quieter secondary option) -->
<a class="flex items-center space-x-5 text-on-surface-variant hover:text-on-surface transition-colors duration-200" href="#">
<span class="material-symbols-outlined text-[22px]" data-icon="settings">settings</span>
<span class="text-[18px] font-medium tracking-tight">Instellingen</span>
</a>
<!-- Uitloggen (Footer position) -->
<a class="flex items-center space-x-5 text-on-surface-variant hover:text-error transition-colors duration-200" href="#">
<span class="material-symbols-outlined text-[22px]" data-icon="logout">logout</span>
<span class="text-[18px] font-medium tracking-tight">Uitloggen</span>
</a>
</div>
</div>
</nav>
</main>
