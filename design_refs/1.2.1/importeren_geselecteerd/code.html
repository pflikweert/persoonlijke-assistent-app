<!DOCTYPE html>

<html class="light" lang="nl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-tertiary-fixed": "#002204",
            "background": "#faf9f6",
            "surface-container-highest": "#e3e2df",
            "on-primary-fixed-variant": "#574400",
            "outline": "#807660",
            "secondary-fixed-dim": "#a7c8ff",
            "on-primary-fixed": "#241a00",
            "on-primary-container": "#5e4a00",
            "on-surface-variant": "#4e4633",
            "secondary": "#395f94",
            "on-secondary": "#ffffff",
            "surface-bright": "#faf9f6",
            "surface-tint": "#745b00",
            "primary-container": "#e6b800",
            "surface-container-low": "#f4f3f0",
            "surface-container-high": "#e9e8e5",
            "inverse-on-surface": "#f2f1ee",
            "on-primary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#9ec2fe",
            "tertiary": "#1b6d24",
            "on-secondary-fixed": "#001c3b",
            "inverse-primary": "#f0c115",
            "surface-variant": "#e3e2df",
            "primary-fixed-dim": "#f0c115",
            "surface": "#faf9f6",
            "primary-fixed": "#ffe08a",
            "tertiary-fixed": "#a3f69c",
            "tertiary-container": "#7fd07a",
            "on-error-container": "#93000a",
            "on-surface": "#1b1c1a",
            "tertiary-fixed-dim": "#88d982",
            "on-tertiary": "#ffffff",
            "error": "#ba1a1a",
            "on-tertiary-container": "#005914",
            "on-secondary-container": "#284f83",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#1e477b",
            "surface-container": "#efeeeb",
            "on-error": "#ffffff",
            "outline-variant": "#d1c5ac",
            "secondary-fixed": "#d5e3ff",
            "surface-dim": "#dbdad7",
            "on-tertiary-fixed-variant": "#005312",
            "inverse-surface": "#2f312f",
            "on-background": "#1b1c1a",
            "primary": "#745b00"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .primary-cta-gradient {
      background: linear-gradient(45deg, #745b00 0%, #e6b800 100%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-[#faf9f6] dark:bg-stone-950 flex items-center justify-between px-6 py-4 z-50">
<div class="flex items-center gap-4">
<button class="hover:bg-stone-200/50 dark:hover:bg-stone-800/50 transition-colors p-2 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-stone-900 dark:text-stone-50" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-stone-900 dark:text-stone-50 text-lg">Settings</h1>
</div>
<div class="flex items-center gap-2">
<div class="text-lg font-bold text-stone-900 dark:text-stone-50">Importeren</div>
</div>
</header>
<main class="flex-1 max-w-2xl mx-auto w-full px-6 py-12 flex flex-col items-center">
<!-- Hero Status Section -->
<div class="w-full text-center mb-10">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-tertiary-container/20 text-on-tertiary-container text-xs font-medium mb-4">
<span class="material-symbols-outlined text-[16px]" data-icon="check_circle">check_circle</span>
        Bestanden geselecteerd
      </div>
<h2 class="text-3xl font-headline font-bold tracking-tight text-on-surface mb-2">Klaar voor import</h2>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-md mx-auto">
        We hebben je geselecteerde Markdown-bestanden gevonden. Klik op de knop hieronder om ze toe te voegen aan je persoonlijke bibliotheek.
      </p>
</div>
<!-- Asymmetric Bento-style List -->
<div class="w-full space-y-3 mb-12">
<!-- File Item 1 -->
<div class="group relative overflow-hidden rounded-2xl bg-surface-container-low hover:bg-surface-container transition-colors duration-300 p-5 flex items-center gap-4">
<div class="h-12 w-12 rounded-xl bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="description">description</span>
</div>
<div class="flex-1">
<div class="text-sm font-semibold text-on-surface">dagboek.md</div>
<div class="text-xs text-on-surface-variant">2.4 MB</div>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- File Item 2 -->
<div class="group relative overflow-hidden rounded-2xl bg-surface-container-low hover:bg-surface-container transition-colors duration-300 p-5 flex items-center gap-4">
<div class="h-12 w-12 rounded-xl bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="description">description</span>
</div>
<div class="flex-1">
<div class="text-sm font-semibold text-on-surface">reflectie_2025.md</div>
<div class="text-xs text-on-surface-variant">1.1 MB</div>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Action Section -->
<div class="w-full flex flex-col gap-4 mt-auto">
<button class="primary-cta-gradient w-full py-5 rounded-full flex items-center justify-center gap-3 shadow-xl shadow-primary/10 hover:shadow-2xl hover:shadow-primary/20 active:scale-[0.98] transition-all duration-300 group">
<span class="text-white font-bold tracking-wide">Importeer bestanden</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform" data-icon="cloud_upload">cloud_upload</span>
</button>
<button class="w-full py-4 rounded-full border border-outline-variant text-on-surface-variant text-sm font-medium hover:bg-surface-container-low transition-colors duration-200 active:scale-[0.98]">
        Andere bestanden kiezen
      </button>
</div>
</main>
<!-- Illustration / Decorative Background Element -->
<div class="fixed bottom-0 left-0 w-full h-1/4 -z-10 opacity-40 pointer-events-none overflow-hidden">
<div class="absolute -bottom-20 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-primary-container/20 blur-[120px] rounded-full"></div>
</div>
</body></html>
