<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-fixed": "#241a00",
            "inverse-surface": "#2f312f",
            "surface-container-low": "#f4f3f0",
            "surface-container-high": "#e9e8e5",
            "on-tertiary-fixed": "#002204",
            "error-container": "#ffdad6",
            "on-error-container": "#93000a",
            "primary-fixed": "#ffe08a",
            "on-error": "#ffffff",
            "on-background": "#1b1c1a",
            "tertiary-fixed-dim": "#88d982",
            "secondary-fixed-dim": "#a7c8ff",
            "inverse-on-surface": "#f2f1ee",
            "error": "#ba1a1a",
            "surface-dim": "#dbdad7",
            "tertiary": "#1b6d24",
            "secondary-container": "#9ec2fe",
            "surface-container-lowest": "#ffffff",
            "surface-container": "#efeeeb",
            "surface-bright": "#faf9f6",
            "primary-fixed-dim": "#f0c115",
            "inverse-primary": "#f0c115",
            "primary-container": "#e6b800",
            "tertiary-container": "#7fd07a",
            "secondary-fixed": "#d5e3ff",
            "on-secondary": "#ffffff",
            "on-surface-variant": "#4e4633",
            "on-tertiary-fixed-variant": "#005312",
            "outline": "#807660",
            "on-primary-container": "#5e4a00",
            "background": "#F7F6F3",
            "primary": "#745b00",
            "on-tertiary": "#ffffff",
            "on-primary-fixed-variant": "#574400",
            "on-primary": "#ffffff",
            "surface-variant": "#e3e2df",
            "outline-variant": "#d1c5ac",
            "tertiary-fixed": "#a3f69c",
            "on-secondary-container": "#284f83",
            "on-secondary-fixed-variant": "#1e477b",
            "surface-tint": "#745b00",
            "surface-container-highest": "#e3e2df",
            "secondary": "#395f94",
            "on-secondary-fixed": "#001c3b",
            "surface": "#F7F6F3",
            "on-surface": "#1b1c1a",
            "on-tertiary-container": "#005914"
          },
          fontFamily: {
            "headline": ["Inter", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .waveform-bar {
      width: 5px;
      background-color: #E6B800;
      border-radius: 9999px;
      margin: 0 4px;
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes organic-breathe {
      0%, 100% { transform: scaleY(0.7); opacity: 0.6; }
      50% { transform: scaleY(1.3); opacity: 1; }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 40px 10px rgba(230, 184, 0, 0.05); }
      50% { box-shadow: 0 0 70px 25px rgba(230, 184, 0, 0.18); }
    }
    .animate-waveform-active {
      animation: organic-breathe 1.8s ease-in-out infinite;
    }
    .waveform-glow {
      animation: glow-pulse 4s ease-in-out infinite;
      border-radius: 50%;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed min-h-[100dvh] flex flex-col items-center">
<!-- Top Navigation -->
<nav class="w-full max-w-lg px-6 pt-6 flex justify-start z-10">
<button class="text-secondary font-medium text-base py-2 hover:opacity-70 transition-opacity">
      Annuleer
    </button>
</nav>
<main class="flex-1 w-full flex flex-col items-center justify-between pb-16 pt-8 px-8 relative max-w-lg mx-auto">
<!-- Centerpiece: Waveform & Status -->
<div class="flex flex-col items-center justify-center flex-1 w-full -mt-12">
<!-- Recording Status Label -->
<div class="mb-8 flex flex-col items-center gap-1">
<span class="text-sm font-semibold tracking-widest uppercase text-secondary/70">Aan het luisteren...</span>
</div>
<div class="relative flex items-center justify-center mb-10">
<div class="waveform-glow absolute w-56 h-56 bg-primary/5 -z-10"></div>
<div class="h-48 flex items-center justify-center relative">
<div class="waveform-bar h-12 animate-waveform-active" style="animation-delay: -0.8s"></div>
<div class="waveform-bar h-24 animate-waveform-active" style="animation-delay: -0.6s"></div>
<div class="waveform-bar h-36 animate-waveform-active" style="animation-delay: -0.4s"></div>
<div class="waveform-bar h-44 animate-waveform-active" style="animation-delay: -0.2s"></div>
<div class="waveform-bar h-32 animate-waveform-active" style="animation-delay: -0.5s"></div>
<div class="waveform-bar h-20 animate-waveform-active" style="animation-delay: -0.3s"></div>
<div class="waveform-bar h-10 animate-waveform-active" style="animation-delay: -0.7s"></div>
</div>
</div>
</div>
<!-- Transcript Content -->
<div class="w-full text-center mb-16 px-4">
<p class="text-xl md:text-2xl font-normal italic leading-relaxed text-on-surface opacity-90">
        "I was thinking about how the light changes in the studio around 4 PM..."
      </p>
</div>
<!-- Primary Signature CTA: Klaar -->
<div class="w-full flex justify-center pb-8">
<button class="w-full max-w-[240px] py-5 rounded-full bg-gradient-to-b from-[#FFD700] to-[#E6B800] shadow-[0_12px_40px_rgba(230,184,0,0.35)] flex items-center justify-center text-on-primary-fixed transition-all hover:scale-[1.02] active:scale-95 group">
<span class="text-xl font-bold tracking-wide">Klaar</span>
</button>
</div>
<!-- Subtle Decorative Background -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full max-w-md bg-gradient-radial from-primary-fixed/5 to-transparent pointer-events-none -z-10"></div>
</main>
</body></html>
